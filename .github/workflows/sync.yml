name: Cozy Feed Crawl Data

on:
  schedule:
    - cron: "0 */3 * * *" # Chạy cào tin mỗi 3 tiếng
  workflow_dispatch: # Kích hoạt thủ công từ tab Actions với tùy chọn
    inputs:
      source:
        description: "Tên nguồn tin muốn cào riêng (để trống để cào tất cả, ví dụ: dantri)"
        required: false
        default: ""
      force:
        description: "Bắt buộc cào lại từ đầu (-f)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  crawl-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Fetch existing images
        run: |
          git clone --branch images https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git images || mkdir images

      - name: Run Scraper Sync
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.source }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS -f"
          fi
          echo "Running sync with args: $ARGS"
          deno task sync $ARGS

      - name: Deploy Images to images branch
        run: |
          if [ -d "images" ] && [ "$(ls -A images)" ]; then
            echo "Deploying images to images branch..."
            cd images
            git init
            git checkout -b images
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git add .
            git commit -m "chore: auto-sync active images"
            git push origin images --force
          else
            echo "No images found. Skipping images branch deploy."
          fi

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json sync_meta.json

          # Chỉ commit nếu data.json hoặc sync_meta.json có thay đổi
          if git diff --cached --quiet; then
            echo "No changes in data.json or sync_meta.json. Skipping commit."
          else
            git commit -m "chore: auto-update news feeds [skip ci]"
            git push
          fi
